appId: com.android.chrome
tags:
  - regression
---
- runFlow:
    file: login.yaml
    optional: true

- scrollUntilVisible:
    element:
      text: .* in stock
- tapOn: Add to Cart
- copyTextFrom:
    text: "[0-9]{1,3}.[0-9]{2}"
    below:
      text: 📦
      index: 0
- runScript:
    file: "scripts/firstItem.js"
- assertVisible: "Total: $${output.firstItem}"
- assertVisible: 
      text: "1"
      rightOf: DemoShop

#Check out of Stock does not add to cart
- scrollUntilVisible:
    element:
      text: Out of stock
    visibilityPercentage: 100
    centerElement: true
- tapOn:
    text: Out of Stock
    index: 1
- assertVisible: 
      text: "1"
      rightOf: DemoShop

# Add Second item to cart
- scrollUntilVisible:
    element:
      text: Running Shoes
    visibilityPercentage: 100
    centerElement: true
- tapOn:
    text: Add to Cart
    below: Running Shoes
- copyTextFrom:
    text: "[0-9]{1,3}.[0-9]{2}"
    below:
      text: Running Shoes

- runScript:
    file: scripts/combined.js

- assertVisible: "Total: $${output.combined}"





